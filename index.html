<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sparkinfer · eval log</title>
<meta name="description" content="Immutable, reproducible evaluation log for sparkinfer (SN74). One verifiable page per eval run." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237B5DFF'/%3E%3Cpath d='M9 21l6-12 2 6h6' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<style>
  :root{--bg:#06050B;--panel:#110E1E;--line:#221d36;--ink:#F4F2FB;--body:#B7B2CC;--muted:#7C7794;
    --brand:#7B5DFF;--brand2:#A78BFF;--green:#37C871}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--body);font-family:Sora,system-ui,-apple-system,sans-serif;line-height:1.55}
  a{color:var(--brand2);text-decoration:none} a:hover{text-decoration:underline}
  .mono{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px}
  header{border-bottom:1px solid var(--line);background:rgba(6,5,11,.8);position:sticky;top:0;backdrop-filter:blur(10px);z-index:5}
  .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:10px;color:var(--ink);font-weight:700}
  .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(120deg,#7B5DFF,#A78BFF 55%,#37C871);display:grid;place-items:center}
  .nav .links{display:flex;gap:20px;font-size:14px} .nav .links a{color:var(--body)}
  h1{color:var(--ink);font-size:26px;margin:0 0 6px;letter-spacing:-.02em}
  h2{color:var(--ink);font-size:19px;margin:0}
  .sub{color:var(--muted);font-size:14px;margin:0 0 26px}
  section{padding:34px 0}
  /* badges */
  .b{display:inline-block;padding:3px 9px;border-radius:7px;font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .b.XL{background:#0E8A1622;color:#37C871} .b.L{background:#1D76DB22;color:#5fa3f5}
  .b.M{background:#8250DF22;color:#b794ff} .b.S{background:#B8860B22;color:#e0b341}
  .b.XS{background:#8A93A022;color:#9aa6b2} .b.none{background:#9AA6B222;color:#9aa6b2}
  .b.REJECT{background:#B6020522;color:#ff6b6b} .b.BASELINE{background:#0E8A1622;color:#37C871}
  /* index table */
  table{width:100%;border-collapse:collapse;font-size:14px;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
  thead th{background:var(--panel);color:var(--ink);font-size:12.5px;font-weight:600}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:rgba(255,255,255,.02)}
  td.r{text-align:right;font-family:'JetBrains Mono',monospace}
  /* run page */
  .card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:24px;margin-bottom:22px}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px 24px;margin-top:18px}
  .kv .k{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .kv .v{color:var(--ink);font-size:16px;font-weight:600;font-family:'JetBrains Mono',monospace;margin-top:3px}
  .note{font-size:13.5px;color:var(--muted);border-left:2px solid var(--brand);padding:4px 0 4px 14px;margin:18px 0}
  pre{background:#08070F;border:1px solid var(--line);border-radius:12px;padding:18px;overflow:auto;
    font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.5;color:#cfc8ea;max-height:70vh}
  .back{font-size:14px;display:inline-block;margin-bottom:18px}
  .pill{display:inline-flex;gap:7px;align-items:center;padding:5px 11px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;color:var(--body)}
  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px;text-align:center}
  .loading{color:var(--muted);padding:40px 0;text-align:center}
</style>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
<header><div class="wrap nav">
  <a class="brand" href="./"><span class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 18l6-12 3 8h5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>sparkinfer · eval log</a>
  <div class="links">
    <a href="https://gittensor-ai-lab.github.io/sparkinfer/dashboard/" target="_blank">Dashboard</a>
    <a href="https://github.com/gittensor-ai-lab/sparkinfer/blob/main/EVAL-TRUST.md" target="_blank">Trust model</a>
    <a href="https://github.com/gittensor-ai-lab/sparkinfer" target="_blank">GitHub</a>
  </div>
</div></header>

<main class="wrap"><section id="app"><div class="loading mono">loading…</div></section></main>

<footer class="wrap">
  Immutable, reproducible record of every sparkinfer SN74 evaluation.
  Each run's raw <span class="mono">log.txt</span> + <span class="mono">result.json</span> are committed to this repo —
  the page is just a view. <a href="https://github.com/gittensor-ai-lab/sparkinfer/blob/main/EVAL-TRUST.md" target="_blank">How to verify →</a>
</footer>

<script>
const $ = s => document.querySelector(s);
const esc = t => String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const qp = new URLSearchParams(location.search).get("run");

async function getJSON(u){ const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(u); return r.json(); }
async function getText(u){ const r=await fetch(u,{cache:"no-store"}); if(!r.ok) throw new Error(u); return r.text(); }

function badge(l){ return `<span class="b ${esc(l)}">eval:${esc(l)}</span>`; }

async function renderIndex(){
  let runs=[];
  try{ runs = await getJSON("index.json"); }catch(e){}
  runs.sort((a,b)=> (b.id>a.id?1:-1));
  const rows = runs.map(r=>`<tr>
    <td><a href="?run=${encodeURIComponent(r.id)}">#${esc(r.pr)}</a></td>
    <td>${badge(r.label)}</td>
    <td class="r">${r.delta_pct==null?"—":(r.delta_pct>0?"+":"")+esc(r.delta_pct)+"%"}</td>
    <td class="r">${esc(r.tps??"—")}</td>
    <td style="color:var(--body)">${esc((r.title||"").slice(0,52))}</td>
    <td class="mono" style="color:var(--muted)">${esc(r.date||"")}</td>
  </tr>`).join("");
  $("#app").innerHTML = `
    <h1>Evaluation log</h1>
    <p class="sub">Every PR evaluation, recorded immutably. Same-box, warmed, accuracy-gated — <a href="https://github.com/gittensor-ai-lab/sparkinfer/blob/main/EVAL-TRUST.md" target="_blank">reproducible from source</a>.</p>
    ${runs.length? `<table><thead><tr><th>PR</th><th>verdict</th><th class="r">Δ%</th><th class="r">tok/s</th><th>change</th><th>date</th></tr></thead><tbody>${rows}</tbody></table>`
      : `<div class="loading">No runs recorded yet.</div>`}`;
  document.title = "sparkinfer · eval log";
}

async function renderRun(id){
  $("#app").innerHTML = `<div class="loading mono">loading run ${esc(id)}…</div>`;
  let r, log="";
  try{ r = await getJSON(`runs/${id}/result.json`); }
  catch(e){ $("#app").innerHTML = `<a class="back" href="./">← all runs</a><div class="card">Run <span class="mono">${esc(id)}</span> not found.</div>`; return; }
  try{ log = await getText(`runs/${id}/log.txt`); }catch(e){ log="(log unavailable)"; }
  const d = r.delta_pct, dl = r.delta_tps;
  $("#app").innerHTML = `
    <a class="back" href="./">← all runs</a>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">
        <div><h2>PR #${esc(r.pr)}</h2>
          <div style="color:var(--body);font-size:14.5px;margin-top:5px">${esc(r.title||"")}</div>
          ${r.url?`<a href="${esc(r.url)}" target="_blank" style="font-size:13px">${esc(r.url)} ↗</a>`:""}
        </div>
        <div>${badge(r.label)}</div>
      </div>
      <div class="kv">
        <div><div class="k">decode (this PR)</div><div class="v">${esc(r.tps??"—")} tok/s</div></div>
        <div><div class="k">same-box baseline</div><div class="v">${esc(r.baseline_tps??"—")} tok/s</div></div>
        <div><div class="k">delta</div><div class="v">${d==null?"—":(d>0?"+":"")+esc(d)+"%"}${dl!=null?` <span style="color:var(--muted);font-size:12px">(${dl>0?"+":""}${esc(dl)})</span>`:""}</div></div>
        <div><div class="k">top-1 vs llama.cpp</div><div class="v">${r.top1!=null?(r.top1*100).toFixed(1)+"%":"—"}</div></div>
        <div><div class="k">KL vs llama.cpp</div><div class="v">${esc(r.kl??"—")}</div></div>
        <div><div class="k">commit</div><div class="v">${esc(r.commit??"—")}</div></div>
        <div><div class="k">GPU</div><div class="v" style="font-size:13px">${esc(r.gpu||"RTX 5090")}</div></div>
        <div><div class="k">date</div><div class="v" style="font-size:13px">${esc(r.date||"")}</div></div>
      </div>
      <div class="note">Same-box A/B: <code>main</code> and this PR were built from source and benched on the <b>same warmed RTX 5090</b>, scoring the delta so hardware variance cancels. The verdict is a deterministic function of these measurements — <a href="https://github.com/gittensor-ai-lab/sparkinfer/blob/main/EVAL-TRUST.md" target="_blank">reproduce it yourself</a>.</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="pill" href="runs/${esc(id)}/log.txt" target="_blank">📄 raw log.txt</a>
        <a class="pill" href="runs/${esc(id)}/result.json" target="_blank">{ } result.json</a>
        ${r.url?`<a class="pill" href="${esc(r.url)}" target="_blank">↗ the PR</a>`:""}
      </div>
    </div>
    <h2 style="margin-bottom:12px">Evaluation log</h2>
    <pre>${esc(log)}</pre>`;
  document.title = `#${r.pr} eval:${r.label} · sparkinfer log`;
}

(qp ? renderRun(qp) : renderIndex()).catch(e=>{ $("#app").innerHTML = `<div class="loading">Error: ${esc(e.message)}</div>`; });
</script>
</body>
</html>
